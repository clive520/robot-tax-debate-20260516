<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 辯論入口網</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="portal">
  <header class="portal-topbar">
    <a href="./" class="brand">AI 辯論資料庫</a>
    <nav aria-label="首頁導覽">
      <a href="#debates">議題</a>
      <a href="debates/robot-tax/" data-latest-link>最新辯論</a>
    </nav>
  </header>

  <main class="portal-shell">
    <section class="portal-intro" aria-labelledby="portal-title">
      <div>
        <p class="eyebrow">AI Debate Archive</p>
        <h1 id="portal-title">辯論議題入口</h1>
        <p class="lede">收錄 AI 角色參與的正式辯論。每個議題包含正反方完整發言、裁判評審結果與三種角色語音。</p>
      </div>
      <dl class="portal-stats" aria-label="目前收錄狀態">
        <div>
          <dt>議題</dt>
          <dd data-topic-count>0</dd>
        </div>
        <div>
          <dt>角色語音</dt>
          <dd>3</dd>
        </div>
      </dl>
    </section>

    <section id="debates" class="portal-section" aria-labelledby="latest-heading">
      <div class="portal-section-head">
        <p class="eyebrow">Debates</p>
        <h2 id="latest-heading">議題清單</h2>
      </div>

      <div class="debate-list" data-debate-list>
        <article class="portal-empty">議題清單載入中。</article>
      </div>
    </section>
  </main>

  <footer>
    <p>Generated on 2026-05-16 · debates/</p>
  </footer>
  <script src="portal.js"></script>
</body>
</html>
