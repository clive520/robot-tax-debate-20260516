<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 辯論所</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="portal">
  <header class="portal-topbar">
    <a href="./" class="brand">AI 辯論所</a>
    <nav aria-label="首頁導覽">
      <a href="#debates">議題</a>
      <a href="debates/robot-tax/" data-latest-link>最新辯論</a>
    </nav>
  </header>

  <main class="portal-shell">
    <section class="portal-intro" aria-labelledby="portal-title">
      <div>
        <p class="eyebrow">AI Debate Studio</p>
        <h1 id="portal-title">AI 辯論所</h1>
        <p class="lede">讓不同 AI 角色擔任正方、反方與裁判，針對公共議題進行完整辯論。每集包含辯論全文、裁判評分、YouTube 影片與 Podcast 音訊。</p>
        <p class="portal-schedule">每星期五下午五點，發布一場新的 AI 辯論。</p>
      </div>
      <dl class="portal-stats" aria-label="目前收錄狀態">
        <div>
          <dt>議題</dt>
          <dd data-topic-count>0</dd>
        </div>
        <div>
          <dt>固定更新</dt>
          <dd>週五 17:00</dd>
        </div>
      </dl>
    </section>

    <section id="debates" class="portal-section" aria-labelledby="latest-heading">
      <div class="portal-section-head">
        <p class="eyebrow">Debates</p>
        <h2 id="latest-heading">辯論集數</h2>
      </div>

      <div class="debate-list" data-debate-list>
        <article class="portal-empty">議題清單載入中。</article>
      </div>
    </section>
  </main>

  <footer>
    <p>AI 辯論所 · 每星期五 17:00 更新</p>
  </footer>
  <script src="portal.js"></script>
</body>
</html>
